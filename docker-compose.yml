version: "3.9"

services:

  postgres:

    image: postgres:17

    container_name: crm-postgres

    restart: unless-stopped

    environment:

      POSTGRES_DB: crm

      POSTGRES_USER: postgres

      POSTGRES_PASSWORD: postgres

    ports:

      - "5432:5432"

    volumes:

      - postgres_data:/var/lib/postgresql/data

  redis:

    image: redis:7

    container_name: crm-redis

    restart: unless-stopped

    ports:

      - "6379:6379"

  backend:

    build:

      context: ./backend

    container_name: crm-backend

    depends_on:

      - postgres

      - redis

    env_file:

      - ./backend/.env

    ports:

      - "8080:8080"

  worker:

    build:

      context: ./backend

    container_name: crm-worker

    depends_on:

      - postgres

      - redis

    env_file:

      - ./backend/.env

    command: ["./crm-worker"]

  frontend:

    build:

      context: ./frontend

    container_name: crm-frontend

    depends_on:

      - backend

    environment:

      NEXT_PUBLIC_API_URL: http://localhost:8080/api/v1

    ports:

      - "3000:3000"

volumes:

  postgres_data: