components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT from POST /auth/login
  responses:
    BadRequest:
      description: Malformed request or business validation failure
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            simple:
              value:
                success: false
                message: Invalid request
                errors: null
            fieldErrors:
              value:
                success: false
                message: Validation failed
                errors:
                - field: email
                  message: Must be a valid email
            appError:
              value:
                success: false
                message: Invalid request
                errors:
                - code: BAD_REQUEST
    Unauthorized:
      description: Missing or invalid Bearer token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            message: Unauthorized
            errors: null
    Forbidden:
      description: Authenticated but lacking permission / module ACL
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            message: Forbidden
            errors: null
    NotFound:
      description: Resource not found in the caller's organization
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            message: Not found
            errors:
            - code: NOT_FOUND
    Conflict:
      description: Conflict (duplicate slug, system role, job not ready, etc.)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            message: Conflict
            errors:
            - code: CONFLICT
    ValidationError:
      description: Field-level validation errors (HTTP 400; record engine / import)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            message: Validation failed
            errors:
            - field: name
              message: This field is required
            - field: email
              message: Must be a valid email
    InternalError:
      description: Unexpected server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            message: Internal server error
            errors: null
  schemas:
    APIResponse:
      type: object
      required:
      - success
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: OK
        data:
          description: Endpoint-specific payload
          nullable: true
        errors:
          nullable: true
          description: Field errors or app error items when success is false
          oneOf:
          - type: array
            items:
              $ref: '#/components/schemas/FieldValidationError'
          - type: array
            items:
              $ref: '#/components/schemas/AppErrorItem'
    ErrorResponse:
      type: object
      required:
      - success
      - message
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: Validation failed
        data:
          nullable: true
        errors:
          nullable: true
          oneOf:
          - type: array
            items:
              $ref: '#/components/schemas/FieldValidationError'
          - type: array
            items:
              $ref: '#/components/schemas/AppErrorItem'
    ErrorCode:
      type: string
      enum:
      - BAD_REQUEST
      - UNAUTHORIZED
      - FORBIDDEN
      - NOT_FOUND
      - CONFLICT
      - VALIDATION_ERROR
      - INTERNAL_SERVER_ERROR
      example: BAD_REQUEST
    FieldValidationError:
      type: object
      required:
      - field
      - message
      properties:
        field:
          type: string
          example: email
        message:
          type: string
          example: Must be a valid email
    AppErrorItem:
      type: object
      required:
      - code
      properties:
        code:
          $ref: '#/components/schemas/ErrorCode'
    RegisterRequest:
      type: object
      required:
      - name
      - email
      - password
      properties:
        name:
          type: string
          example: Ada Lovelace
        email: &id001
          type: string
          format: email
          example: ada@example.com
        password:
          type: string
          format: password
          minLength: 8
          example: Secret@12345
    LoginRequest:
      type: object
      required:
      - email
      - password
      properties:
        email: *id001
        password:
          type: string
          format: password
          example: Admin@123
    UserResponse:
      type: object
      required:
      - id
      - name
      - email
      properties:
        id: &id002
          type: string
          format: uuid
          example: 11111111-1111-1111-1111-111111111111
        name:
          type: string
          example: Ada Lovelace
        email: *id001
    LoginResponse:
      type: object
      required:
      - access_token
      - user
      properties:
        access_token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        user:
          $ref: '#/components/schemas/UserResponse'
    CreateLeadRequest:
      type: object
